<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA Core -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00F2FF" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- SEO -->
    <title>TitanLog - Premium Gym Tracker</title>
    <meta name="description" content="The ultimate gym tracking and workout logging app. Track workouts, set goals, analyze progress, and get AI-powered fitness insights." />
    <meta name="keywords" content="gym tracker, workout logger, fitness app, weight training, TitanLog" />
    <meta name="author" content="TitanLog" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- ─── iOS PWA (Add to Home Screen) ─────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TitanLog" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-startup-image" href="/icon-512.png" />

    <!-- ─── Android / Microsoft ──────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="TitanLog" />
    <meta name="msapplication-TileColor" content="#08080A" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- ─── Open Graph (share previews) ─────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TitanLog - Premium Gym Tracker" />
    <meta property="og:description" content="Track workouts, set goals, and get AI fitness insights." />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
