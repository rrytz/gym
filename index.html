<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA Core -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#C9A84C" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- SEO -->
    <title>tropa fit — Sama-Sama Tayo</title>
    <meta name="description" content="tropa fit: Your community fitness tracker. Log workouts, set goals, and grow stronger together. Sama-sama tayo." />
    <meta name="keywords" content="gym tracker, workout logger, fitness app, tropa fit, community fitness" />
    <meta name="author" content="tropa fit" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- ─── iOS PWA (Add to Home Screen) ─────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="tropa fit" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-startup-image" href="/icon-512.png" />

    <!-- ─── Android / Microsoft ──────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="tropa fit" />
    <meta name="msapplication-TileColor" content="#141210" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- ─── Open Graph (share previews) ─────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="tropa fit — Sama-Sama Tayo" />
    <meta property="og:description" content="Track workouts, set goals, and get AI fitness insights." />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Capture install prompt BEFORE React mounts (critical timing fix) -->
    <script>
      window.__installPromptEvent = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__installPromptEvent = e;
        // Notify React if it's already mounted
        window.dispatchEvent(new CustomEvent('pwa-install-ready'));
      });
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
